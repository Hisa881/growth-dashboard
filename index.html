<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>成長モニタリングダッシュボード</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;color:#1a1a1a;padding:1rem}
.dash{max-width:900px;margin:0 auto}
h1{font-size:16px;font-weight:500;color:#555;margin-bottom:1rem}
.toolbar{display:flex;gap:8px;align-items:center;margin-bottom:1rem;flex-wrap:wrap}
.toolbar-label{font-size:13px;color:#666;margin-right:4px}
.tab-btn{font-size:13px;padding:5px 14px;border-radius:8px;border:0.5px solid #ccc;background:#fff;color:#1a1a1a;cursor:pointer}
.tab-btn.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.reload-btn{font-size:12px;padding:5px 12px;border-radius:8px;border:0.5px solid #ccc;background:#fff;color:#666;cursor:pointer;margin-left:auto}
.chart-wrap{background:#fff;border-radius:12px;border:0.5px solid #e0e0e0;padding:1rem 1.25rem;margin-bottom:1rem}
.legend{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:1rem}
.legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:#666}
.cards-label{font-size:12px;color:#888;margin-bottom:10px}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px}
.card{background:#fff;border-radius:12px;border:0.5px solid #e0e0e0;padding:14px 16px}
.card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.card-num{font-size:12px;color:#888}
.badge{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500}
.b001{background:#e6f1fb;color:#0c447c}
.b002{background:#e1f5ee;color:#085041}
.b003{background:#faece7;color:#712b13}
.card-id{font-size:17px;font-weight:500;margin-bottom:3px}
.card-sub{font-size:11px;color:#aaa;margin-bottom:10px}
.card-row{display:flex;justify-content:space-between;align-items:center;font-size:13px;margin-bottom:3px}
.card-row-label{color:#888}
.card-val{font-size:13px;font-weight:500}
.delta{font-size:12px;padding:2px 8px;border-radius:20px;font-weight:500}
.dp{background:#e1f5ee;color:#085041}
.dn{background:#fcebeb;color:#791f1f}
.dz{background:#f5f5f5;color:#888}
.unit{font-size:10px;color:#bbb;text-align:right;margin-bottom:3px}
.loading{font-size:13px;color:#888;padding:2rem;text-align:center}
</style>
</head>
<body>
<div class="dash">
  <h1>成長モニタリングダッシュボード</h1>
  <div class="toolbar">
    <span class="toolbar-label">指標：</span>
    <button class="tab-btn active" onclick="setMetric('幹径',this)">幹径</button>
    <button class="tab-btn" onclick="setMetric('全長',this)">全長</button>
    <button class="tab-btn" onclick="setMetric('幹径位置高さ',this)">幹径位置高さ</button>
    <button class="reload-btn" onclick="loadData()">↻ 更新</button>
  </div>
  <div class="chart-wrap">
    <div class="legend" id="legend"></div>
    <div style="position:relative;width:100%;height:280px;">
      <canvas id="mainChart" role="img" aria-label="成長モニタリング折れ線グラフ"></canvas>
    </div>
  </div>
  <div class="cards-label">個体カード — 最新値と初回比変化量</div>
  <div id="cardsGrid" class="cards-grid"><div class="loading">データを読み込み中...</div></div>
</div>

<script>
const SHEET_ID = '1UYMhcuaLvOsMveRjXwA3eQKp0O5RffoAJfJ9oUpqbNk';
const SHEET_NAME = '観察ログ';
const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&sheet=${encodeURIComponent(SHEET_NAME)}`;

const COND_MAP = {1:'COND-001',2:'COND-002',3:'COND-003',4:'COND-001',5:'COND-002',6:'COND-003'};
const COLORS = {
  'COND-001':{s:'#378add',d:'#85b7eb'},
  'COND-002':{s:'#1d9e75',d:'#5dcaa5'},
  'COND-003':{s:'#d85a30',d:'#f0997b'},
};
const METRIC_KEY = {'幹径':'stem','全長':'full','幹径位置高さ':'height'};
const METRIC_UNIT = {'幹径':'mm','全長':'mm','幹径位置高さ':'mm'};
const COND_LABEL = {'COND-001':'2311/2312','COND-002':'2311/2312','COND-003':'2405'};
const IND_SUB = {1:'2311-001',2:'2311-002',3:'2405-002',4:'2312-001',5:'2312-002',6:'2405-001'};
const IND_NUM = ['①','②','③','④','⑤','⑥'];

let parsedData = null;
let currentMetric = '幹径';
let chartInstance = null;

function parseCSV(text){
  const rows=text.trim().split('\n').map(r=>{
    const cols=[];let cur='',inQ=false;
    for(let c of r){if(c==='"'){inQ=!inQ}else if(c===','&&!inQ){cols.push(cur);cur=''}else{cur+=c}}
    cols.push(cur);return cols;
  });
  return rows;
}

async function loadData(){
  document.getElementById('cardsGrid').innerHTML='<div class="loading">データを読み込み中...</div>';
  try{
    const res=await fetch(CSV_URL);
    const text=await res.text();
    const rows=parseCSV(text);
    const data=rows.slice(1).filter(r=>r[0]&&r[5]);
    const individuals={};
    const dates=[];
    data.forEach(r=>{
      const date=r[0]?.trim();
      const num=parseInt(r[5]);
      if(!date||isNaN(num))return;
      if(!dates.includes(date))dates.push(date);
      if(!individuals[num])individuals[num]={};
      individuals[num][date]={
        stem:parseFloat(r[8])||null,
        full:parseFloat(r[6])||null,
        height:parseFloat(r[7])||null,
      };
    });
    dates.sort((a,b)=>new Date(a)-new Date(b));
    parsedData={individuals,dates};
    render();
  }catch(e){
    document.getElementById('cardsGrid').innerHTML='<div class="loading">読み込みに失敗しました。</div>';
  }
}

function fmtDate(d){
  const m=d.match(/(\d+)[\/\-](\d+)[\/\-](\d+)/);
  if(!m)return d;
  return `${String(parseInt(m[2])).padStart(2,'0')}/${String(parseInt(m[3])).padStart(2,'0')}`;
}

function getVal(num,date,metric){
  return parsedData?.individuals[num]?.[date]?.[METRIC_KEY[metric]]??null;
}

function deltaClass(v){return v>0?'delta dp':v<0?'delta dn':'delta dz'}
function deltaLabel(v){return v>0?`+${v}`:v===0?'±0':`${v}`}

function render(){
  if(!parsedData)return;
  const {individuals,dates}=parsedData;
  const nums=[1,2,3,4,5,6];
  const unit=METRIC_UNIT[currentMetric];

  const condPairs={};
  nums.forEach(n=>{
    const c=COND_MAP[n];
    if(!condPairs[c])condPairs[c]=[];
    condPairs[c].push(n);
  });

  const datasets=[];
  Object.entries(condPairs).forEach(([cond,pair])=>{
    pair.forEach((num,i)=>{
      const firstDate=dates.find(d=>getVal(num,d,currentMetric)!==null);
      const firstVal=firstDate?getVal(num,firstDate,currentMetric):null;
      const seriesData=dates.map(d=>{
        const v=getVal(num,d,currentMetric);
        if(v===null||firstVal===null)return null;
        return Math.round((v-firstVal)*10)/10;
      });
      const c=COLORS[cond];
      datasets.push({
        label:`${IND_NUM[num-1]} ${cond}`,
        data:seriesData,
        borderColor:i===0?c.s:c.d,
        backgroundColor:'transparent',
        borderWidth:2,
        borderDash:i===0?[]:[5,4],
        pointBackgroundColor:i===0?c.s:c.d,
        pointRadius:5,
        tension:0.1,
        spanGaps:true,
      });
    });
  });

  if(chartInstance)chartInstance.destroy();
  chartInstance=new Chart(document.getElementById('mainChart'),{
    type:'line',
    data:{labels:dates.map(fmtDate),datasets},
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{
        legend:{display:false},
        tooltip:{callbacks:{label:ctx=>{const v=ctx.parsed.y;return ` ${ctx.dataset.label}: ${v>0?'+':''}${v} ${unit}`}}}
      },
      scales:{
        y:{grid:{color:'rgba(0,0,0,0.06)'},ticks:{color:'#888',callback:v=>(v>0?'+':'')+v}},
        x:{grid:{color:'rgba(0,0,0,0.04)'},ticks:{color:'#888'}}
      }
    }
  });

  const legend=document.getElementById('legend');
  legend.innerHTML='';
  Object.entries(condPairs).forEach(([cond,pair])=>{
    const c=COLORS[cond];
    const e1=document.createElement('span');e1.className='legend-item';
    e1.innerHTML=`<span style="width:24px;height:2px;background:${c.s};display:inline-block;border-radius:2px;"></span>${IND_NUM[pair[0]-1]} ${cond}`;
    legend.appendChild(e1);
    if(pair[1]){
      const e2=document.createElement('span');e2.className='legend-item';
      e2.innerHTML=`<span style="width:24px;height:0;border-top:2px dashed ${c.d};display:inline-block;"></span>${IND_NUM[pair[1]-1]} (破線)`;
      legend.appendChild(e2);
    }
  });

  const grid=document.getElementById('cardsGrid');
  grid.innerHTML='';
  nums.forEach(num=>{
    const cond=COND_MAP[num];
    const validDates=dates.filter(d=>getVal(num,d,currentMetric)!==null);
    if(validDates.length===0)return;
    const firstDate=validDates[0];
    const lastDate=validDates[validDates.length-1];
    const prevDate=validDates[validDates.length-2]??firstDate;
    const latest=getVal(num,lastDate,currentMetric);
    const first=getVal(num,firstDate,currentMetric);
    const prev=getVal(num,prevDate,currentMetric);
    const fromFirst=Math.round((latest-first)*10)/10;
    const fromPrev=Math.round((latest-prev)*10)/10;
    const bc={'COND-001':'b001','COND-002':'b002','COND-003':'b003'}[cond];
    const card=document.createElement('div');card.className='card';
    card.innerHTML=`
      <div class="card-header"><span class="card-num">${IND_NUM[num-1]}</span><span class="badge ${bc}">${cond}</span></div>
      <div class="card-id">${COND_LABEL[cond]}</div>
      <div class="card-sub">${IND_SUB[num]}</div>
      <div class="card-row"><span class="card-row-label">最新値</span><span class="card-val">${latest}<span style="font-size:11px;color:#bbb;margin-left:2px;">${unit}</span></span></div>
      <div class="card-row"><span class="card-row-label">初回比</span><span class="${deltaClass(fromFirst)}">${deltaLabel(fromFirst)}</span></div>
      <div class="unit">${unit}</div>
      <div class="card-row"><span class="card-row-label">前回比</span><span class="${deltaClass(fromPrev)}">${deltaLabel(fromPrev)}</span></div>
      <div class="unit">${unit}</div>
    `;
    grid.appendChild(card);
  });
}

function setMetric(m,el){
  currentMetric=m;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  render();
}

loadData();
</script>
</body>
</html>
