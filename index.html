<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>成長モニタリングダッシュボード</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;color:#1a1a1a;padding:1rem}
.dash{max-width:960px;margin:0 auto}
h1{font-size:15px;font-weight:500;color:#555;margin-bottom:1rem}
.toolbar{display:flex;gap:8px;align-items:center;margin-bottom:1rem;flex-wrap:wrap}
.toolbar-label{font-size:13px;color:#666;margin-right:4px}
.tab-btn{font-size:13px;padding:5px 14px;border-radius:8px;border:0.5px solid #ccc;background:#fff;color:#1a1a1a;cursor:pointer}
.tab-btn.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.reload-btn{font-size:12px;padding:5px 12px;border-radius:8px;border:0.5px solid #ccc;background:#fff;color:#666;cursor:pointer;margin-left:auto}
.chart-wrap{background:#fff;border-radius:12px;border:0.5px solid #e0e0e0;padding:1rem 1.25rem;margin-bottom:1rem}
.legend{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:1rem}
.legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:#666}
.cards-label{font-size:12px;color:#888;margin-bottom:10px}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:10px}
.card{background:#fff;border-radius:12px;border:0.5px solid #e0e0e0;padding:14px 16px}
.card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px}
.card-num{font-size:12px;color:#888}
.badge{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500}
.b001{background:#e6f1fb;color:#0c447c}
.b002{background:#e1f5ee;color:#085041}
.b003{background:#faece7;color:#712b13}
.card-id{font-size:15px;font-weight:500;margin-bottom:1px}
.card-expid{font-size:11px;color:#aaa;margin-bottom:2px}
.card-sub{font-size:11px;color:#bbb;margin-bottom:10px}
.card-row{display:flex;justify-content:space-between;align-items:center;font-size:13px;margin-bottom:3px}
.card-row-label{color:#888}
.card-val{font-size:13px;font-weight:500}
.delta{font-size:12px;padding:2px 8px;border-radius:20px;font-weight:500}
.dp{background:#e1f5ee;color:#085041}
.dn{background:#fcebeb;color:#791f1f}
.dz{background:#f5f5f5;color:#888}
.unit{font-size:10px;color:#bbb;text-align:right;margin-bottom:3px}
.loading{font-size:13px;color:#888;padding:2rem;text-align:center}
.error{font-size:13px;color:#c00;padding:2rem;text-align:center}
</style>
</head>
<body>
<div class="dash">
  <h1>成長モニタリングダッシュボード</h1>
  <div class="toolbar">
    <span class="toolbar-label">指標：</span>
    <button class="tab-btn active" onclick="setMetric('幹径',this)">幹径</button>
    <button class="tab-btn" onclick="setMetric('全長',this)">全長</button>
    <button class="tab-btn" onclick="setMetric('幹径高さ',this)">幹径位置高さ</button>
    <button class="reload-btn" onclick="loadAll()">↻ 更新</button>
  </div>
  <div class="chart-wrap">
    <div class="legend" id="legend"></div>
    <div style="position:relative;width:100%;height:280px;">
      <canvas id="mainChart" role="img" aria-label="成長モニタリング折れ線グラフ"></canvas>
    </div>
  </div>
  <div class="cards-label">個体カード — 最新値と初回比変化量</div>
  <div id="cardsGrid" class="cards-grid"><div class="loading">データを読み込み中...</div></div>
</div>

<script>
const BASE = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRV6-RNtpsSi0q3kwPXcnLGeUu2uo4V1A4L3cN1GyoJzRRbcHNig7QZvIn9aQr9lnQDty7kGk8io2vM/pub';
const GIDS = { master: '342452676', stem: '0', full: '1484510115', height: '461109111' };

const COLORS = {
  'COND-001':{s:'#378add',d:'#85b7eb'},
  'COND-002':{s:'#1d9e75',d:'#5dcaa5'},
  'COND-003':{s:'#d85a30',d:'#f0997b'},
};
const IND_NUM = ['①','②','③','④','⑤','⑥'];
const METRIC_UNIT = {'幹径':'mm','全長':'mm','幹径高さ':'mm'};

let state = { master:[], stem:{}, full:{}, height:{}, dates:[] };
let currentMetric = '幹径';
let chartInstance = null;

function csvUrl(gid){ return `${BASE}?gid=${gid}&single=true&output=csv`; }

function parseCSV(text){
  return text.trim().replace(/\r/g,'').split('\n').map(r=>{
    const cols=[];let cur='',inQ=false;
    for(let c of r){if(c==='"'){inQ=!inQ}else if(c===','&&!inQ){cols.push(cur.trim());cur=''}else{cur+=c}}
    cols.push(cur.trim().replace(/\r/g,""));return cols;
  });
}

function excelDateToStr(serial){
  const d = new Date((serial - 25569) * 86400 * 1000);
  const m = String(d.getUTCMonth()+1).padStart(2,'0');
  const day = String(d.getUTCDate()).padStart(2,'0');
  return `${d.getUTCFullYear()}/${m}/${day}`;
}

function fmtDate(d){
  const m = d.match(/\d+[\/\-](\d+)[\/\-](\d+)/);
  return m ? `${m[1].padStart(2,'0')}/${m[2].padStart(2,'0')}` : d;
}

function parseMeasureSheet(rows){
  const result = {};
  const header = rows[0];
  const nums = header.slice(1).map(v=>parseInt(v));
  rows.slice(1).forEach(r=>{
    let dateRaw = r[0];
    const serial = parseFloat(dateRaw);
    const date = isNaN(serial) ? dateRaw : excelDateToStr(serial);
    nums.forEach((num,i)=>{
      if(!result[num]) result[num]={};
      const v = parseFloat(r[i+1]);
      result[num][date] = isNaN(v) ? null : v;
    });
  });
  return result;
}

function getDates(sheetData){
  const dateSet = new Set();
  Object.values(sheetData).forEach(byDate=>{
    Object.keys(byDate).forEach(d=>dateSet.add(d));
  });
  return [...dateSet].sort((a,b)=>new Date(a)-new Date(b));
}

async function fetchCSV(gid){
  const res = await fetch(csvUrl(gid));
  if(!res.ok) throw new Error(`fetch error ${gid}`);
  return parseCSV(await res.text());
}

async function loadAll(){
  document.getElementById('cardsGrid').innerHTML='<div class="loading">データを読み込み中...</div>';
  try{
    const [masterRows, stemRows, fullRows, heightRows] = await Promise.all([
      fetchCSV(GIDS.master),
      fetchCSV(GIDS.stem),
      fetchCSV(GIDS.full),
      fetchCSV(GIDS.height),
    ]);

    state.master = masterRows.map(r=>({
      id: r[0], expId: r[1], condId: r[2], num: parseInt(r[3])
    })).filter(r=>!isNaN(r.num));

    state.stem   = parseMeasureSheet(stemRows);
    state.full   = parseMeasureSheet(fullRows);
    state.height = parseMeasureSheet(heightRows);
    state.dates  = getDates(state.stem);

    render();
  }catch(e){
    document.getElementById('cardsGrid').innerHTML=`<div class="error">読み込みに失敗しました。スプレッドシートが公開設定か確認してください。</div>`;
    console.error(e);
  }
}

function getSheetData(){ return {'幹径':state.stem,'全長':state.full,'幹径高さ':state.height}[currentMetric]; }

function getVal(num, date){ return getSheetData()?.[num]?.[date] ?? null; }

function deltaClass(v){ return v>0?'delta dp':v<0?'delta dn':'delta dz'; }
function deltaLabel(v){ return v>0?`+${v}`:v===0?'±0':`${v}`; }

function render(){
  const {master, dates} = state;
  if(!master.length || !dates.length) return;
  const unit = METRIC_UNIT[currentMetric];

  const condPairs = {};
  master.forEach(m=>{
    if(!condPairs[m.condId]) condPairs[m.condId]=[];
    condPairs[m.condId].push(m.num);
  });

  const datasets = [];
  Object.entries(condPairs).forEach(([cond, pair])=>{
    pair.forEach((num,i)=>{
      const firstDate = dates.find(d=>getVal(num,d)!==null);
      const firstVal  = firstDate ? getVal(num,firstDate) : null;
      const data = dates.map(d=>{
        const v = getVal(num,d);
        if(v===null||firstVal===null) return null;
        return Math.round((v-firstVal)*10)/10;
      });
      const c = COLORS[cond] || {s:'#888',d:'#bbb'};
      datasets.push({
        label:`${IND_NUM[num-1]} ${cond}`,
        data,
        borderColor: i===0?c.s:c.d,
        backgroundColor:'transparent',
        borderWidth:2,
        borderDash: i===0?[]:[5,4],
        pointBackgroundColor: i===0?c.s:c.d,
        pointRadius:5,
        tension:0.1,
        spanGaps:true,
      });
    });
  });

  if(chartInstance) chartInstance.destroy();
  chartInstance = new Chart(document.getElementById('mainChart'),{
    type:'line',
    data:{labels:dates.map(fmtDate), datasets},
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{
        legend:{display:false},
        tooltip:{callbacks:{label:ctx=>{const v=ctx.parsed.y;return ` ${ctx.dataset.label}: ${v>0?'+':''}${v} ${unit}`}}}
      },
      scales:{
        y:{grid:{color:'rgba(0,0,0,0.06)'},ticks:{color:'#888',callback:v=>(v>0?'+':'')+v}},
        x:{grid:{color:'rgba(0,0,0,0.04)'},ticks:{color:'#888'}}
      }
    }
  });

  const legend = document.getElementById('legend');
  legend.innerHTML='';
  Object.entries(condPairs).forEach(([cond,pair])=>{
    const c = COLORS[cond]||{s:'#888',d:'#bbb'};
    const e1 = document.createElement('span'); e1.className='legend-item';
    e1.innerHTML=`<span style="width:24px;height:2px;background:${c.s};display:inline-block;border-radius:2px;"></span>${IND_NUM[pair[0]-1]} ${cond}`;
    legend.appendChild(e1);
    if(pair[1]){
      const e2 = document.createElement('span'); e2.className='legend-item';
      e2.innerHTML=`<span style="width:24px;height:0;border-top:2px dashed ${c.d};display:inline-block;"></span>${IND_NUM[pair[1]-1]} (破線)`;
      legend.appendChild(e2);
    }
  });

  const grid = document.getElementById('cardsGrid');
  grid.innerHTML='';
  master.forEach(m=>{
    const {num, condId, id, expId} = m;
    const bc = {'COND-001':'b001','COND-002':'b002','COND-003':'b003'}[condId]||'b001';
    const validDates = dates.filter(d=>getVal(num,d)!==null);
    if(!validDates.length) return;
    const firstDate = validDates[0];
    const lastDate  = validDates[validDates.length-1];
    const prevDate  = validDates[validDates.length-2] ?? firstDate;
    const latest    = getVal(num,lastDate);
    const first     = getVal(num,firstDate);
    const prev      = getVal(num,prevDate);
    const fromFirst = Math.round((latest-first)*10)/10;
    const fromPrev  = Math.round((latest-prev)*10)/10;

    const card = document.createElement('div'); card.className='card';
    card.innerHTML=`
      <div class="card-header"><span class="card-num">${IND_NUM[num-1]}</span><span class="badge ${bc}">${condId}</span></div>
      <div class="card-id">${id}</div>
      <div class="card-expid">${expId}</div>
      <div class="card-sub">${condId}</div>
      <div class="card-row"><span class="card-row-label">最新値</span><span class="card-val">${latest}<span style="font-size:11px;color:#bbb;margin-left:2px;">${unit}</span></span></div>
      <div class="card-row"><span class="card-row-label">初回比</span><span class="${deltaClass(fromFirst)}">${deltaLabel(fromFirst)}</span></div>
      <div class="unit">${unit}</div>
      <div class="card-row"><span class="card-row-label">前回比</span><span class="${deltaClass(fromPrev)}">${deltaLabel(fromPrev)}</span></div>
      <div class="unit">${unit}</div>
    `;
    grid.appendChild(card);
  });
}

function setMetric(m,el){
  currentMetric=m;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  render();
}

loadAll();
</script>
</body>
</html>
